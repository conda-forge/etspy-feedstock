{% set python_min = "3.10" %}
{% set name = "etspy" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/etspy-{{ version }}.tar.gz
  sha256: 14ea827ac3ef75888113477f7825406073bd38a31c56211bd92a22481dbbac0a

build:
  number: 0

outputs:
  - name: etspy
    build:
      noarch: python
    script: install.sh
    requirements:
      host:
        - python {{ python_min }}
        - poetry-core
        - pip
      run:
        - python >={{ python_min }}
        - pystackreg >=0.2.8,<0.3.0
        - astra-toolbox >=2.1.0,<3.0.0
        - hyperspy-base >=2.1.1,<3.0.0
        - hyperspy-gui-ipywidgets >=2.0.2,<3.0.0
        - typing_extensions >=4.12.2,<5.0.0
        - numpy >=1.26.0,<3.0.0
        - h5py >=3.12.1,<4.0.0
        - scikit-iamge >=0.24
      run_constrained:
        - ipykernel >=6.29.5,<7.0.0
        - cupy >=13.3.0,<14.0.0
    test:
      imports:
        - etspy
        - etspy.api
      # commands:
      #   - pip check
      requires:
        - pip
  - name: etspy-gpu
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - {{ pin_subpackage('etspy', exact=True) }}
        - cupy >=13.3.0,<14.0.0
    test:
      imports:
        - etspy
        - etspy.api
        - cupy
      # uncomment when etspy >1.0.1 is released
      # needed to avoid pip check failure with etspy 1.0.1
      # https://github.com/usnistgov/etspy/pull/35
      # commands:
      #   - pip check
      requires:
        - pip
        - python {{ python_min }}

about:
  home: https://pages.nist.gov/etspy/
  summary: Suite of tools for processing and reconstruction of electron tomography data
  dev_url: https://github.com/usnistgov/etspy
  license: NIST-PD-fallback
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jat255
    - AndrewHerzing
